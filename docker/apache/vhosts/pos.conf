<VirtualHost *:8080>
    ServerName pos.localhost
    DocumentRoot /var/www/html/POS/public

    <Directory /var/www/html/POS/public>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
