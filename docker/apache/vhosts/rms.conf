<VirtualHost *:8081>
    ServerName rms.localhost
    DocumentRoot /var/www/html/RMS/public

    <Directory /var/www/html/RMS/public>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
