<VirtualHost *:8082>
    ServerName landing.localhost
    DocumentRoot /var/www/html/landing/public

    <Directory /var/www/html/landing/public>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
